<!doctype html>
<html lang="en">
  <head>

  <body
    onload="
     transformar1();

      <div class="col-lg-3 col-sm-4 logo">

        <input type="text" class="pesquisa">

      </div>

      <div class="col-lg-3 col-sm-12 servicos">
        <p>Conta</p>
        <div>

          <p>Carrinho</p>
        </div>
      </div>

    <main>
      <h2>Produtos</h2>
      <!-- tabela -->
      <div class="produtos">
        <!-- linha -->
        <div class="linha">

          <a href="produtos/produto1.html">
            <div class="cardProduto">
              <img src="img/wingStrike.jpg" alt="" width="200px" />
              <p class="nomeProduto">HG 1/144 Wing Strike Gundam</p>
              <div>
                <p class="dolar" id="dolar1">35.00</p>
                <p class="real" id="real1"></p>

          <a href="produtos/produto2.html">

              <p class="nomeProduto">1/100 MG Hyaku-Shiki</p>

        </a>
          
        <a href="produtos/produto4.html">

            <img src="img/rx78.jpg" alt="" height="200px" width="200px" />
            <p class="nomeProduto">1/144 RG RX-78 Gundam 2.0</p>
            <div>
              <p class="dolar" id="dolar4">65.00</p>
              <p class="real" id="real4"></p>
            </div>    
          </div>
        </a>
        
        </div>
